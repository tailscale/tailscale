apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.0
  name: acls.tailscale.com
spec:
  group: tailscale.com
  names:
    kind: ACL
    listKind: ACLList
    plural: acls
    shortNames:
      - acl
    singular: acl
  scope: Cluster
  versions:
    - additionalPrinterColumns:
        - jsonPath: .spec.tailnetRef
          name: Tailnet
          type: string
        - jsonPath: .status.conditions[?(@.type == "ACLSynced")].reason
          name: Status
          type: string
        - jsonPath: .metadata.creationTimestamp
          name: Age
          type: date
      name: v1alpha1
      schema:
        openAPIV3Schema:
          description: |-
            ACL defines the desired Tailnet ACL (policy file) to be applied to a Tailnet.
            The operator syncs the policy from this resource to the Tailscale API using the
            Tailnet's OAuth credentials. The Tailnet's Secret must have OAuth scopes
            policy_file:read and policy_file.

            Only one ACL should target a given Tailnet. The policy can be provided
            inline (spec.policy) or from a ConfigMap/Secret (spec.policyFrom).
            See https://tailscale.com/kb/1018/acls and the Tailscale API policy file docs.
          type: object
          required:
            - spec
          properties:
            apiVersion:
              description: |-
                APIVersion defines the versioned schema of this representation of an object.
                Servers should convert recognized schemas to the latest internal value, and
                may reject unrecognized values.
                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
              type: string
            kind:
              description: |-
                Kind is a string value representing the REST resource this object represents.
                Servers may infer this from the endpoint the client submits requests to.
                Cannot be updated.
                In CamelCase.
                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - tailnetRef
              properties:
                policy:
                  description: |-
                    Policy is the policy file content as JSON or HuJSON. Either Policy or
                    PolicyFrom must be set.
                  type: string
                policyFrom:
                  description: |-
                    PolicyFrom references a ConfigMap or Secret key containing the policy
                    file (JSON or HuJSON). The referenced object must exist in the same
                    namespace as the operator (Tailscale namespace).
                  type: object
                  properties:
                    configMapKeyRef:
                      description: Selects a key from a ConfigMap.
                      type: object
                      required:
                        - key
                      properties:
                        key:
                          description: The key to select.
                          type: string
                        name:
                          description: |-
                            Name of the referent.
                            This field is effectively required, but due to backwards compatibility is
                            allowed to be empty. Instances of this type with an empty value here are
                            almost certainly wrong.
                            More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                          type: string
                          default: ""
                        optional:
                          description: Specify whether the ConfigMap or its key must be defined
                          type: boolean
                      x-kubernetes-map-type: atomic
                    secretKeyRef:
                      description: SecretKeySelector selects a key of a Secret.
                      type: object
                      required:
                        - key
                      properties:
                        key:
                          description: The key of the secret to select from.  Must be a valid secret key.
                          type: string
                        name:
                          description: |-
                            Name of the referent.
                            This field is effectively required, but due to backwards compatibility is
                            allowed to be empty. Instances of this type with an empty value here are
                            almost certainly wrong.
                            More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                          type: string
                          default: ""
                        optional:
                          description: Specify whether the Secret or its key must be defined
                          type: boolean
                      x-kubernetes-map-type: atomic
                tailnetRef:
                  description: |-
                    TailnetRef is the name of the Tailnet custom resource whose credentials
                    are used to get and set the ACL. The Tailnet must exist and be ready.
                  type: string
            status:
              type: object
              properties:
                conditions:
                  type: array
                  items:
                    description: Condition contains details for one aspect of the current state of this API Resource.
                    type: object
                    required:
                      - lastTransitionTime
                      - message
                      - reason
                      - status
                      - type
                    properties:
                      lastTransitionTime:
                        description: |-
                          lastTransitionTime is the last time the condition transitioned from one status to another.
                          This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                        type: string
                        format: date-time
                      message:
                        description: |-
                          message is a human readable message indicating details about the transition.
                          This may be an empty string.
                        type: string
                        maxLength: 32768
                      observedGeneration:
                        description: |-
                          observedGeneration represents the .metadata.generation that the condition was set based upon.
                          For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                          with respect to the current state of the instance.
                        type: integer
                        format: int64
                        minimum: 0
                      reason:
                        description: |-
                          reason contains a programmatic identifier indicating the reason for the condition's last transition.
                          Producers of specific condition types may define expected values and meanings for this field,
                          and whether the values are considered a guaranteed API.
                          The value should be a CamelCase string.
                          This field may not be empty.
                        type: string
                        maxLength: 1024
                        minLength: 1
                        pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      status:
                        description: status of the condition, one of True, False, Unknown.
                        type: string
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                      type:
                        description: type of condition in CamelCase or in foo.example.com/CamelCase.
                        type: string
                        maxLength: 316
                        pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                  x-kubernetes-list-map-keys:
                    - type
                  x-kubernetes-list-type: map
                etag:
                  description: |-
                    ETag is the last ETag returned by the Tailscale API for the policy file.
                    Used for safe updates (If-Match).
                  type: string
                lastSyncTime:
                  description: LastSyncTime is the last time the policy was successfully synced.
                  type: string
                  format: date-time
      served: true
      storage: true
      subresources:
        status: {}
